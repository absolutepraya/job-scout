# job-watcher queries — intern hunt
hours_old: 168   # bumped from 72 to 1 week for fresher-window scoring

# Minimum fit_score to include in digest. Set to 0 for no filter.
# Lowered 2026-05-26 from 40 → 20 to catch more borderline Indonesia-local
# postings (Accenture/Astra/Halliburton-class with sparse signals).
min_score: 20

# Skip postings with these workmodes. Options: onsite, remote, abroad.
# Leave [] for no filter.
workmode_blacklist:
  - abroad
  - remote

limits:
  linkedin: 25
  indeed: 50
  glassdoor: 25
  google: 25

limits_tier2:
  linkedin: 10

queries:
  - "software engineer intern"
  - "ai intern"
  - "backend intern"
  - "it intern"
  - "machine learning intern"
  - "software engineering intern"
  - "automation engineer intern"
  - "solutions consultant intern"

locations:
  - {name: "Jakarta, Indonesia", country_indeed: "Indonesia", is_remote: false, tier: 1}
  # Tier-2 oversea locations removed 2026-05-22 — only Indonesia on-site is delivered.
  # "Remote" entries also removed; workmode_blacklist now drops remote postings.

# Required: title must contain at least one of these (case-insensitive)
title_must_match_any:
  - "intern"
  - "internship"
  - "magang"

# Drop noise & ineligible roles (case-insensitive substring)
title_must_not_match:
  - "sales"
  - "marketing intern"
  - "marketing"
